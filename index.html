<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Prachi 🎉</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
  <style>
    body { margin:0; background: linear-gradient(135deg,#ff758c,#ff7eb3); font-family:'Poppins',sans-serif; color:#fff; text-align:center; overflow-x:hidden; }

    h1 { margin-top:40px; font-size:3rem; animation: glow 2s infinite alternate; }
    @keyframes glow { from{ text-shadow:0 0 10px #fff;} to{ text-shadow:0 0 30px yellow;} }

    /* INTRO SCREEN */
    .intro {
      position:fixed; inset:0; background:#000; color:#fff;
      display:flex; flex-direction:column; justify-content:center; align-items:center;
      z-index:10;
    }

    .intro button { margin-top:20px; padding:12px 25px; border:none; border-radius:25px; cursor:pointer; }

    /* TYPING TEXT */
    .typing { font-size:1.3rem; min-height:40px; margin:10px auto; }

    /* SLIDESHOW */
    .slideshow { max-width:400px; margin:30px auto; }
    .slides { display:none; }
    .slides img { width:100%; border-radius:20px; }
    .caption { margin-top:10px; font-size:1rem; }

    /* POPUP */
    .popup { position:fixed; inset:0; background:rgba(0,0,0,0.7); display:flex; justify-content:center; align-items:center; visibility:hidden; }
    .popup-content { background:#fff; color:#ff4d6d; padding:30px; border-radius:20px; max-width:300px; }
    .show { visibility:visible; }

    button { margin:20px; padding:12px 25px; border:none; border-radius:25px; background:#fff; color:#ff4d6d; cursor:pointer; font-weight:bold; }

    /* CONFETTI */
    .confetti { position:fixed; width:10px; height:10px; top:0; animation:fall 3s linear infinite; }
    @keyframes fall { to{ transform:translateY(100vh) rotate(360deg);} }
  </style>
</head>
<body>

<!-- INTRO -->
<div class="intro" id="intro">
  <h2>Hey Prachi 🎉</h2>
  <p>Something special for you...</p>
  <button onclick="startExperience()">Start</button>
</div>

<h1>Happy Birthday Prachi 🎂</h1>
<div class="typing" id="typing"></div>

<button onclick="startSurprise()">Final Surprise 🎁</button>

<!-- SLIDESHOW WITH CAPTIONS -->
<div class="slideshow">
  <div class="slides"><img src="1.jpg"><div class="caption">From random selfies to best memories ❤️</div></div>
  <div class="slides"><img src="2.jpeg"><div class="caption">Your smile = instant mood lift 😄</div></div>
  <div class="slides"><img src="3.jpeg"><div class="caption">Our chaos >>> everything 😂</div></div>
  <div class="slides"><img src="4.jpeg"><div class="caption">Stay the same amazing person 💖</div></div>
</div>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-content">
    🎉 HAPPY BIRTHDAY PRACHI 🎉<br><br>
    Stay crazy, stay amazing 💖🔥
    <br><br>
    <button onclick="closePopup()">Close</button>
  </div>
</div>

<!-- MUSIC -->
<audio id="music" src="music.mp3"></audio>

<script>
  // INTRO
  function startExperience(){
    document.getElementById("intro").style.display="none";
    startTyping();
  }

  // TYPING EFFECT
  const message = "Life is just better with you in it. Thanks for everything 💖";
  let i=0;
  function startTyping(){
    const el = document.getElementById("typing");
    function type(){
      if(i < message.length){
        el.innerHTML += message.charAt(i);
        i++;
        setTimeout(type,50);
      }
    }
    type();
  }

  // SLIDESHOW
  let slideIndex=0;
  showSlides();
  function showSlides(){
    let slides=document.getElementsByClassName("slides");
    for(let i=0;i<slides.length;i++) slides[i].style.display="none";
    slideIndex++;
    if(slideIndex>slides.length) slideIndex=1;
    slides[slideIndex-1].style.display="block";
    setTimeout(showSlides,2500);
  }

  // SURPRISE
  function startSurprise(){
    document.getElementById("popup").classList.add("show");
    document.getElementById("music").play();
    launchConfetti();
  }

  function closePopup(){
    document.getElementById("popup").classList.remove("show");
  }

  // CONFETTI
  function launchConfetti(){
    for(let i=0;i<60;i++){
      let c=document.createElement("div");
      c.classList.add("confetti");
      c.style.left=Math.random()*100+"vw";
      c.style.background=`hsl(${Math.random()*360},100%,50%)`;
      document.body.appendChild(c);
      setTimeout(()=>c.remove(),3000);
    }
  }
</script>

</body>
</html>

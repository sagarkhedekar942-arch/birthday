<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Prachi 🎉</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      font-family: 'Poppins', sans-serif;
      overflow-x: hidden;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 40px;
      font-size: 3rem;
      animation: glow 2s infinite alternate;
    }

    p {
      font-size: 1.2rem;
      max-width: 600px;
      margin: 10px auto;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px white; }
      to { text-shadow: 0 0 30px yellow; }
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .gallery img {
      width: 100%;
      border-radius: 20px;
      transition: transform 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.08);
    }

    .balloon {
      position: absolute;
      bottom: -150px;
      width: 50px;
      height: 70px;
      border-radius: 50%;
      animation: floatUp 6s infinite ease-in;
    }

    .balloon:nth-child(1) { left: 10%; background: red; }
    .balloon:nth-child(2) { left: 30%; background: blue; animation-delay: 2s; }
    .balloon:nth-child(3) { left: 60%; background: green; animation-delay: 4s; }
    .balloon:nth-child(4) { left: 80%; background: purple; animation-delay: 1s; }

    @keyframes floatUp {
      0% { transform: translateY(0); }
      100% { transform: translateY(-120vh); }
    }

    button {
      margin: 20px;
      padding: 12px 25px;
      font-size: 1rem;
      border: none;
      border-radius: 25px;
      background: white;
      color: #ff4d6d;
      cursor: pointer;
      font-weight: bold;
    }

    /* Popup */
    .popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      visibility: hidden;
    }

    .popup-content {
      background: white;
      color: #ff4d6d;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      max-width: 300px;
      font-weight: bold;
    }

    .show {
      visibility: visible;
    }

  </style>
</head>
<body>

  <h1>Happy Birthday Prachi 🎂</h1>
  <p>You are not just a friend, you're one of the best parts of my life. Thank you for all the memories, laughs, and crazy moments. 💖</p>

  <button onclick="showMessage()">Click for Surprise 🎁</button>

  <div class="gallery">
    <!-- Use EXACT same names as your files -->
    <img src="1.jpg">
    <img src="2.jpeg">
    <img src="3.jpeg">
    <img src="4.jpeg">
  </div>

  <div class="balloon"></div>
  <div class="balloon"></div>
  <div class="balloon"></div>
  <div class="balloon"></div>

  <!-- Popup -->
  <div id="popup" class="popup">
    <div class="popup-content">
      🎉 Happy Birthday Prachi! 🎉<br><br>
      You deserve all the happiness in the world 💖🔥
      <br><br>
      <button onclick="closePopup()">Close</button>
    </div>
  </div>

  <script>
    function showMessage() {
      document.getElementById("popup").classList.add("show");
    }

    function closePopup() {
      document.getElementById("popup").classList.remove("show");
    }
  </script>

</body>
</html>
